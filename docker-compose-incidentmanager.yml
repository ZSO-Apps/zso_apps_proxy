services:
  frontend:
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_RFO_BACKEND_URL=${RFO_BACKEND_URL}
      - NEXT_PUBLIC_RFO_STAGE=${RFO_STAGE}
    ports: !override
      - '3000:3000'
      - '3035:3035'
    env_file:
      - .env
    networks:
      - proxy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      
      # HTTP Router & Redirect zu HTTPS
      - "traefik.http.routers.im-frontend-http.entrypoints=web"
      - "traefik.http.routers.im-frontend-http.rule=Host(`${INCIDENTMANAGER_FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.im-frontend-http.service=im-frontend-service"
      - "traefik.http.routers.im-frontend-http.middlewares=im-frontend-redirect"
      - "traefik.http.middlewares.im-frontend-redirect.redirectscheme.scheme=https"
      
      # HTTPS Router
      - "traefik.http.routers.im-frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.im-frontend-secure.rule=Host(`${INCIDENTMANAGER_FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.im-frontend-secure.tls=true"
      - "traefik.http.routers.im-frontend-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.im-frontend-secure.service=im-frontend-service"
      
      # Interner Next.js Port im Container
      - "traefik.http.services.im-frontend-service.loadbalancer.server.port=3000"

  backend:
    image: gradle:7.6-jdk17
    command: ['sh', 'dev.sh']
    working_dir: /app
    restart: always
    networks:
      - proxy-network
      - default
    ports: !override
      - '3001:8080'
      - '5005:5005'
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"

      # HTTP Router & Redirect zu HTTPS (Greift bei /api)
      - "traefik.http.routers.im-backend-http.entrypoints=web"
      - "traefik.http.routers.im-backend-http.rule=Host(`${INCIDENTMANAGER_BACKEND_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.im-backend-http.service=im-backend-service"
      - "traefik.http.routers.im-backend-http.middlewares=im-backend-redirect"
      - "traefik.http.middlewares.im-backend-redirect.redirectscheme.scheme=https"

      # HTTPS Router (Behoben: Greift JETZT auch auf /api via HTTPS)
      - "traefik.http.routers.im-backend-secure.entrypoints=websecure"
      - "traefik.http.routers.im-backend-secure.rule=Host(`${INCIDENTMANAGER_BACKEND_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.im-backend-secure.tls=true"
      - "traefik.http.routers.im-backend-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.im-backend-secure.service=im-backend-service"

      # Interner Spring Boot Port (Behoben: Muss der INTERNE Port 8080 sein, nicht 3001)
      - "traefik.http.services.im-backend-service.loadbalancer.server.port=8080" 
    env_file:
      - .env

  database:
    environment:
      - MYSQL_DATABASE=${RFO_DATABASE_NAME}
      - MYSQL_USER=${RFO_DATABASE_USERNAME}
      - MYSQL_PASSWORD=${RFO_DATABASE_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${RFO_DATABASE_ROOT_PASSWORD}
    ports:
      - '3002:3306'
    env_file:
      - .env
    networks:
      - default

networks:
  proxy-network:
    external: true