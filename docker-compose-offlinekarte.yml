services:
  offlinekarte-search-db:
    image: postgis/postgis
    container_name: offlinekarte-search-db
    volumes:
      - ./searchserv/initdb.d:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PASSWORD=postgres
    networks:
      - default

  offlinekarte-search:
    build: ./searchserv/
    container_name: offlinekarte-search
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - proxy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      
      # HTTP Router für die Suche (Pfad /search)
      - "traefik.http.routers.offline-search-http.entrypoints=web"
      - "traefik.http.routers.offline-search-http.rule=Host(`${OFK_SEARCH_DOMAIN}`)"
      - "traefik.http.routers.offline-search-http.service=offline-search-service"
      
      # HTTPS Router für die Suche
      - "traefik.http.routers.offline-search-secure.entrypoints=websecure"
      - "traefik.http.routers.offline-search-secure.rule=Host(`${OFK_SEARCH_DOMAIN}`)"
      - "traefik.http.routers.offline-search-secure.tls=true"
      - "traefik.http.routers.offline-search-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.offline-search-secure.service=offline-search-service"
      
      # Interner Port des Search-Service
      - "traefik.http.services.offline-search-service.loadbalancer.server.port=8000"

  offlinekarte-tileserver:
    image: maptiler/tileserver-gl
    container_name: offlinekarte-tileserver
    ports:
      - "8080:8080"
    volumes:
      - ./mapserv/data:/data
    env_file:
      - tileserver.env
      - .env # Für die OFK_DOMAIN Variable
    networks:
      - proxy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      
      # HTTP Router für den Tileserver (Standard-Pfad /)
      - "traefik.http.routers.offline-tiles-http.entrypoints=web"
      - "traefik.http.routers.offline-tiles-http.rule=Host(`${OFK_TILE_DOMAIN}`)"
      - "traefik.http.routers.offline-tiles-http.service=offline-tiles-service"
      
      # HTTPS Router für den Tileserver
      - "traefik.http.routers.offline-tiles-secure.entrypoints=websecure"
      - "traefik.http.routers.offline-tiles-secure.rule=Host(`${OFK_TILE_DOMAIN}`)"
      - "traefik.http.routers.offline-tiles-secure.tls=true"
      - "traefik.http.routers.offline-tiles-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.offline-tiles-secure.service=offline-tiles-service"
      
      # Interner Port des Tileservers
      - "traefik.http.services.offline-tiles-service.loadbalancer.server.port=8080"

networks:
  proxy-network:
    external: true