version: "3.8"

services:
  pwa-app:
    # Ersetze dies mit deinem tatsächlichen Image (z. B. nginx:alpine, node:18, etc.)
    image: dein-pwa-image:latest 
    ports:
      - "${PWA_PORT:-8080}:8080"
    environment:
      - ORG=${ZSO_ORG:-Generic}
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      
      # HTTP Router & Redirect zu HTTPS
      - "traefik.http.routers.pwa-http.entrypoints=web"
      - "traefik.http.routers.pwa-http.rule=Host(`${PWA_DOMAIN}`)"
      - "traefik.http.routers.pwa-http.service=pwa-service"
      - "traefik.http.routers.pwa-http.middlewares=pwa-redirect"
      - "traefik.http.middlewares.pwa-redirect.redirectscheme.scheme=https"
      
      # HTTPS Router
      - "traefik.http.routers.pwa-secure.entrypoints=websecure"
      - "traefik.http.routers.pwa-secure.rule=Host(`${PWA_DOMAIN}`)"
      - "traefik.http.routers.pwa-secure.tls=true"
      - "traefik.http.routers.pwa-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.pwa-secure.service=pwa-service"
      
      # Interner Container-Port
      - "traefik.http.services.pwa-service.loadbalancer.server.port=8080"

networks:
  proxy-network:
    external: true