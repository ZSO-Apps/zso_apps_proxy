services:
  postgresql-zskarte:
    image: bitnamilegacy/postgresql:16.3.0
    container_name: postgresql-zskarte
    restart: unless-stopped
    volumes:
      - ./data/postgresql:/bitnami/postgresql
      - ./packages/server/init:/docker-entrypoint-initdb.d
    ports:
      - 55432:5432
    environment:
      - POSTGRESQL_PASSWORD=supersecret123
      - POSTGRESQL_DATABASE=zskarte
    networks:
      - zskarte

  pgadmin-zskarte:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-zskarte
    restart: unless-stopped
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
      - ./packages/server/init/servers.json:/pgadmin4/servers.json
    ports:
      - 7050:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=info@zskarte.ch
      - PGADMIN_DEFAULT_PASSWORD=zskarte
    networks:
      - zskarte

  server-zskarte:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: server-zskarte
    ports:
      - 1337:1337
    environment:
      - DATABASE_HOST=postgresql-zskarte
      - DATABASE_PORT=5432
    env_file:
      - .env
    networks:
      - zskarte
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      
      # HTTP Router (API)
      - "traefik.http.routers.zsk-api-http.entrypoints=web"
      - "traefik.http.routers.zsk-api-http.rule=Host(`${ZSK_API_DOMAIN}`)"
      - "traefik.http.routers.zsk-api-http.service=zsk-api-service"
      
      # HTTPS Router (API) - Fest auf TLS gesetzt
      - "traefik.http.routers.zsk-api-secure.entrypoints=websecure"
      - "traefik.http.routers.zsk-api-secure.rule=Host(`${ZSK_API_DOMAIN}`)"
      - "traefik.http.routers.zsk-api-secure.tls=true"
      - "traefik.http.routers.zsk-api-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.zsk-api-secure.service=zsk-api-service"
      
      # Interner Port des Express/NestJS Server-Backends
      - "traefik.http.services.zsk-api-service.loadbalancer.server.port=1337"

  app-zskarte:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: app-zskarte
    ports:
      - 4300:80
    env_file:
      - .env
    networks:
      - zskarte
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      
      # HTTP Router (Frontend App)
      - "traefik.http.routers.zsk-app-http.entrypoints=web"
      - "traefik.http.routers.zsk-app-http.rule=Host(`${ZSK_DOMAIN}`)"
      - "traefik.http.routers.zsk-app-http.service=zsk-app-service"
      
      # HTTPS Router (Frontend App) - Fest auf TLS gesetzt
      - "traefik.http.routers.zsk-app-secure.entrypoints=websecure"
      - "traefik.http.routers.zsk-app-secure.rule=Host(`${ZSK_DOMAIN}`)"
      - "traefik.http.routers.zsk-app-secure.tls=true"
      - "traefik.http.routers.zsk-app-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.zsk-app-service=zsk-app-service"
      
      # Interner Port im nginx/apache des Frontend-Containers
      - "traefik.http.services.zsk-app-service.loadbalancer.server.port=80"

networks:
  zskarte:
    driver: bridge
  proxy-network:
    external: true