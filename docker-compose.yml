services:
  # Der Sicherheits-Proxy, der den Socket für SELinux lesbar macht
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: zso_socket_proxy
    restart: unless-stopped
    privileged: true  # Erlaubt das Lesen unter SELinux
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1  # Traefik darf Container-Infos lesen
    networks:
      - proxy-network

  traefik:
    image: traefik:latest
    container_name: zso_apps_proxy
    restart: unless-stopped
    # user und group_add werden nicht mehr benötigt!
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # WICHTIG: Traefik schaut nun auf den Proxy statt auf die Datei!
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      
      # Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=deine-email@deine-domain.de"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Die Socket-Zeile ist hier komplett weg!
      - ./letsencrypt:/letsencrypt
    networks:
      - proxy-network
    depends_on:
      - socket-proxy

networks:
  proxy-network:
    external: true