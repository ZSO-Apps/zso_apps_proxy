services:
  # Der Sicherheits-Proxy, der den Socket für SELinux lesbar macht
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: zso_socket_proxy
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - NETWORKS=1
    networks:
      - proxy-network

  traefik:
    image: traefik:latest
    container_name: zso_apps_proxy
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      
      # Entrypoints variabel über Umgebungsvariablen gesteuert
      - "--entrypoints.web.address=:${PROXY_HTTP_PORT}"
      - "--entrypoints.websecure.address=:${PROXY_HTTPS_PORT}"
      
      # Let's Encrypt Konfiguration mit dynamischer Mail
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_MAIL_CONTACT}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      # Port-Mappings auf dem Synology-Host matchen die internen Variablen
      - "${PROXY_HTTP_PORT}:${PROXY_HTTP_PORT}"
      - "${PROXY_HTTPS_PORT}:${PROXY_HTTPS_PORT}"
    volumes:
      - ./letsencrypt:/letsencrypt
    networks:
      - proxy-network
    depends_on:
      - socket-proxy

networks:
  proxy-network:
    external: true